name: Publish Instagram Stories

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  get_stories:
    name: Get stories from Instagram
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
      - name: Download Instagram stories
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs')
            const months = [
                'Januar', 'Februar', 'März', 'April', 'Mai',
                'Juni', 'July', 'August', 'September',
                'Oktober', 'November', 'Dezember'
            ];
            const response = await fetch('https://graph.instagram.com/17841473933794435/stories?access_token=${{ secrets.IG_TOKEN }}');
            const data = await response.json();

            if (data.hasOwnProperty('data')) {
                const stories = data['data'];
                console.log(`Found ${stories.length} stories`);
                if (stories.length > 0) {
                    for (const story of stories) {
                        const json = await story;
                        getStory(story['id']);
                    }
                }
            }

            async function getStory(id) {
                const story_url = `https://graph.instagram.com/${id}?fields=media_url,timestamp&access_token=${{secrets.IG_TOKEN}}`
                const response = await fetch(story_url);
                const data = await response.json();

                if (data.hasOwnProperty('media_url')) {
                    const url = await data['media_url'].trim();
                    const time = await data['timestamp']
                    const date = time.split('T')[0]
                    const month = date.substring(5,7)
                    const year = date.substring(0,4)

                    var name = url.split('/')
                    const trimName = name[name.length - 1].split('?')[0].replace(/\\s+/g, '')
                    console.log('Story: ' + trimName);
                    await exec.exec('curl', ['-f', '-L', '-g', '-o', `content/instagram/${year}${month}/${trimName}`, '--create-dirs', url])
                    var content = ""
                    const dateInFile = `\n#### {{< display_date "${date}T00:00:00+0000" >}}\n`
                    const fileHeader = `---\ndraft: false\ntitle: ${months[month - 1]} ${year}\nsummary: "Hier findest du die Stories vom ${months[month - 1]}"\n---\n`
                    try {
                        const fileContent = fs.readFileSync(`content/instagram/${year}${month}/index.md`, 'utf8');
                        var stripedFileContent = fileContent.replace(fileHeader, "").trimStart()
                        if (stripedFileContent.includes(date)) {
                            console.log("Date present")
                             stripedFileContent = stripedFileContent.replace(`#### {{< display_date "${date}T00:00:00+0000" >}}`, "").trimStart()
                        }
                        if (fileContent.includes(trimName.substring(0, trimName.length - 4))) {
                            console.log("Story already in the file")
                            return
                        }
                    } catch (e) {
                        if (e.code === 'ENOENT') {
                            console.log("Creating Folder...")
                            var stripedFileContent = ""
                            await fs.mkdirSync(`content/instagram/${year}${month}/`, { recursive: true });
                            console.log("Created Folde");
                        }
                    }

                    if (trimName.endsWith(".webp")) {
                        content = `{{< display_time "${time}" >}} \n ![](${trimName} "")\n`;
                    } else {
                        content = `{{< display_time  "${time}" >}} \n {{< video src="${trimName.substring(0, trimName.length - 4)}" autoplay="false" controls="true" loop="true" >}}\n`;
                    }
                    console.log("Writing File...")
                    fs.writeFileSync(`content/instagram/${year}${month}/index.md`, `${fileHeader} ${dateInFile} ${content} ${stripedFileContent}`);
                }
            }
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Saved new stories
          branch: main
          commit_user_name: insta-stalker
          commit_user_email: actions@github.com
          commit_author: insta-stalker <actions@github.com>
