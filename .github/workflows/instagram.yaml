name: Publish Instagram Stories

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  get_stories:
    name: Get stories from Instagram
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install curl
        run: sudo apt-get update && sudo apt-get install -y curl
      - name: Download Instagram stories
        uses: actions/github-script@v8
        with:
          script: |
            const response = await fetch('https://graph.instagram.com/17841478714461116/stories?access_token=${{ secrets.IG_TOKEN }}');
            const data = await response.json();

            if (data.hasOwnProperty('data')) {
                const stories = data['data'];
                console.log(`Found ${stories.length} stories`);
                if (stories.length > 0) {
                    for (const story of stories) {
                        const json = await story;
                        getStory(story['id']);
                    }
                }
            }

            async function getStory(id) {
                const story_url = `https://graph.instagram.com/${id}?fields=media_url,timestamp&access_token=${{secrets.IG_TOKEN}}`
                const response = await fetch(story_url);
                const data = await response.json();

                if (data.hasOwnProperty('media_url')) {
                    const url = await data['media_url'].trim();
                    const time = await data['timestamp']
                    var name = url.split('/')
                    const trimName = name[name.length - 1].split('?')[0].replace(/\\s+/g, '')
                    console.log('Story: ' + trimName);
                    await exec.exec('curl', ['-f', '-L', '-g', '-o', `content/instagram/${trimName}`, url])
                    if (trimName.endsWith(".webp")) {
                      await exec.exec('echo', [`"{{< display_time \"${time}\" >}} \n ![](${trimName} \"\")"`, '>>', 'content/instagram/index.md'])
                    } else {
                      await exec.exec('echo', [`"{{< display_time  \"${time}\" >}} \n {{< video src=\"${trimName.substring(0, trimName.length - 4)}\" autoplay="false" controls="true" loop="true" >}}"`, '>>', 'content/instagram/index.md'])
                    }
                }
            }
      - uses: stefanzweifel/git-auto-commit-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit_message: Saved new stories
          branch: main
          commit_user_name: insta-stalker 🤖
          commit_user_email: actions@github.com
          commit_author: insta-stalker 🤖 <actions@github.com>
